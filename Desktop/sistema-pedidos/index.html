<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página do Garçom</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Página do Garçom</h1>
    <label>Mesa:</label>
    <input type="number" id="mesa" placeholder="Número da mesa">
    
    <label>Pedido:</label>
    <textarea id="pedido" placeholder="Descreva o pedido"></textarea>
    
    <label>Observação:</label>
    <textarea id="observacao" placeholder="Alguma observação?"></textarea>
    
    <button onclick="enviarPedido()">Enviar Pedido</button>

    <script type="module" src="js/garcom.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
</body>
</html>
