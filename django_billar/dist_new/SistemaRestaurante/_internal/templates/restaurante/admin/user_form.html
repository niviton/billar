{% extends 'restaurante/admin/base_admin.html' %}

{% block title %}Novo Membro - {{ app_settings.store_name }}{% endblock %}

{% block admin_content %}
<div class="max-w-[600px] mx-auto">
    <!-- Título -->
    <div class="mb-8">
        <a href="{% url 'admin_users' %}" class="text-slate-400 hover:text-slate-600 transition-all inline-flex items-center gap-2 mb-4">
            <i class="bi bi-arrow-left"></i>Voltar
        </a>
        <h1 class="text-3xl font-black text-slate-800">Novo Membro</h1>
        <p class="text-slate-500">Adicione um novo membro à equipe</p>
    </div>
    
    <!-- Formulário -->
    <form method="post" class="bg-white rounded-3xl p-8 border border-slate-200">
        {% csrf_token %}
        
        <div class="space-y-6">
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-2">Nome de usuário</label>
                <input 
                    type="text" 
                    name="username"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 placeholder:text-slate-400 focus:ring-2 focus:ring-red-500/50 focus:border-red-500 outline-none transition-all font-medium"
                    placeholder="Ex: joao_garcom"
                    required
                />
            </div>
            
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-2">Senha</label>
                <input 
                    type="password" 
                    name="password"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 placeholder:text-slate-400 focus:ring-2 focus:ring-red-500/50 focus:border-red-500 outline-none transition-all font-medium"
                    placeholder="••••••••"
                    required
                />
            </div>
            
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-2">Função</label>
                <select 
                    name="role"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 focus:ring-2 focus:ring-red-500/50 focus:border-red-500 outline-none transition-all font-medium"
                >
                    <option value="garcom">🧑‍💼 Garçom</option>
                    <option value="cozinha">👨‍🍳 Cozinha</option>
                    <option value="gerente">👔 Gerente</option>
                </select>
            </div>
        </div>
        
        <div class="flex gap-4 mt-8 pt-6 border-t border-slate-100">
            <a href="{% url 'admin_users' %}" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-xl font-bold text-center hover:bg-slate-200 transition-all">
                Cancelar
            </a>
            <button type="submit" class="flex-1 py-4 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-xl font-bold hover:shadow-lg hover:shadow-red-500/30 transition-all">
                <i class="bi bi-check-lg me-2"></i>Criar Membro
            </button>
        </div>
    </form>
</div>
{% endblock %}
