{% extends 'base.html' %}
{% load static %}

{% block title %}Login - {{ app_settings.store_name }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
    <!-- Background blobs -->
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-purple-600 rounded-full blur-[150px] opacity-20 animate-blob"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-red-600 rounded-full blur-[150px] opacity-20 animate-blob animation-delay-2000"></div>

    <div class="bg-white/10 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/20 z-10">
        <div class="text-center mb-10">
            <div class="w-28 h-28 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner ring-4 ring-white/10 overflow-hidden">
                {% if app_settings.logo %}
                <img src="{{ app_settings.logo.url }}" alt="Logo" class="w-full h-full object-cover" />
                {% else %}
                <i class="bi bi-shop text-5xl text-white"></i>
                {% endif %}
            </div>
            <h1 class="text-4xl font-black text-white tracking-tight">{{ app_settings.store_name }}</h1>
            <p class="text-white/60 font-medium mt-1">{{ app_settings.slogan }}</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="text-xs font-bold text-white/50 uppercase tracking-widest ml-1">Usuário</label>
                <input 
                    type="text" 
                    name="username"
                    class="w-full px-5 py-4 bg-slate-800/50 border border-white/10 rounded-2xl text-white placeholder:text-white/30 focus:ring-2 focus:ring-red-500/50 outline-none transition-all font-medium"
                    placeholder="Digite seu usuário"
                    required
                />
            </div>
            
            <div class="space-y-2">
                <label class="text-xs font-bold text-white/50 uppercase tracking-widest ml-1">Senha</label>
                <input 
                    type="password" 
                    name="password"
                    class="w-full px-5 py-4 bg-slate-800/50 border border-white/10 rounded-2xl text-white placeholder:text-white/30 focus:ring-2 focus:ring-red-500/50 outline-none transition-all font-medium"
                    placeholder="••••••••"
                    required
                />
            </div>
            
            <button 
                type="submit" 
                class="w-full py-5 bg-gradient-to-r from-red-600 to-orange-600 text-white rounded-[1.5rem] font-bold shadow-xl hover:shadow-red-600/30 hover:scale-[1.02] active:scale-[0.98] transition-all"
            >
                Entrar no Sistema
            </button>
        </form>
    </div>
</div>
{% endblock %}
